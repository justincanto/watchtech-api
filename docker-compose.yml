version: "3.9"

networks:
  watchtech:
    driver: bridge

services:
  api:
    build: .
    container_name: watchtech-backend
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/watchtech
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      db:
        condition: service_started
    restart: unless-stopped
    networks:
      - watchtech

  # Celery worker for content processing tasks
  celery-worker:
    build: .
    container_name: watchtech-celery-worker
    command: celery -A celery_app.celery_app worker --loglevel=info --concurrency=2 -Q default,content,source
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/watchtech
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      db:
        condition: service_started
    restart: unless-stopped
    networks:
      - watchtech

  # RabbitMQ message broker
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: watchtech-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - watchtech_rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672" # AMQP port
      - "15672:15672" # Management UI
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - watchtech

  db:
    image: postgres:16-alpine
    container_name: watchtech-database
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=watchtech
    ports:
      - "5432:5432"
    volumes:
      - watchtech_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - watchtech

  # Redis for pub/sub and batch storage
  redis:
    image: redis:7-alpine
    container_name: watchtech-redis
    ports:
      - "6379:6379"
    volumes:
      - watchtech_redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - watchtech

volumes:
  watchtech_postgres_data:
  watchtech_rabbitmq_data:
  watchtech_redis_data:
