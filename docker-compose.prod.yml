version: "3.12"

networks:
  internal:
    driver: bridge
  traefik_public:
    external: true

services:
  api:
    build: .
    container_name: watchtech-backend
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/watchtech
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      db:
        condition: service_started
    restart: unless-stopped
    networks:
      - internal
      - traefik_public
    labels:
      - "traefik.enable=true"
      # Routing
      - "traefik.http.routers.watchtech.rule=Host(`api.watchtech.io`)"
      - "traefik.http.routers.watchtech.entrypoints=websecure"
      - "traefik.http.routers.watchtech.tls.certresolver=le"
      - "traefik.http.services.watchtech.loadbalancer.server.port=8000"
      # Redirect HTTP -> HTTPS
      - "traefik.http.routers.watchtech-http.rule=Host(`api.watchtech.io`)"
      - "traefik.http.routers.watchtech-http.entrypoints=web"
      - "traefik.http.routers.watchtech-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      # CRITICAL: Tell Traefik which network to use
      - "traefik.docker.network=traefik_public"

  # Celery worker for content processing tasks
  celery-worker:
    build: .
    container_name: watchtech-celery-worker
    command: celery -A celery_app.celery_app worker --loglevel=info --concurrency=2 -Q default,content,source
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/watchtech
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      db:
        condition: service_started
    restart: unless-stopped
    networks:
      - internal

  # Celery beat scheduler for periodic tasks (optional, for future use)
  celery-beat:
    build: .
    container_name: watchtech-celery-beat
    command: celery -A celery_app.celery_app beat --loglevel=info
    env_file:
      - ./.env
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
    volumes:
      - .:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # RabbitMQ message broker
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: watchtech-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - watchtech_rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "15672:15672" # Management UI (internal only, remove in production if not needed)
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  db:
    image: postgres:16-alpine
    container_name: watchtech-database
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=watchtech
    volumes:
      - watchtech_postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped

  # Redis for pub/sub and batch storage
  redis:
    image: redis:7-alpine
    container_name: watchtech-redis
    volumes:
      - watchtech_redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  watchtech_postgres_data:
  watchtech_rabbitmq_data:
  watchtech_redis_data:
